name: Support Agent Eval
description: Evaluation suite for a customer support chatbot
model: claude-sonnet-4-5-20250929

criteria:
  - key: accuracy
    label: Factual Accuracy
    description: Response matches expected answer on key facts
    weight: 40
  - key: completeness
    label: Completeness
    description: Covers all key points from the expected answer
    weight: 30
  - key: hallucination
    label: Hallucination Check
    description: No fabricated or unsupported information
    weight: 30

custom_rules:
  - Never recommend competitor products
  - Always maintain a professional and helpful tone
  - If unsure, acknowledge uncertainty rather than guessing

tests:
  - question: What is your return policy?
    expected_answer: |
      We offer a 30-day return policy for all unused items in original
      packaging. Items must be returned with a valid receipt. Refunds
      are processed within 5-7 business days to the original payment method.
    tags: [policy, returns]

  - question: How do I reset my password?
    expected_answer: |
      To reset your password: 1) Go to the login page, 2) Click "Forgot Password",
      3) Enter your email address, 4) Check your inbox for a reset link,
      5) Click the link and create a new password. The link expires after 24 hours.
    tags: [account, password]

  - question: Do you offer international shipping?
    expected_answer: |
      Yes, we ship to over 50 countries. International shipping takes 7-14
      business days. Shipping costs vary by destination and are calculated
      at checkout. Customs duties and taxes are the responsibility of the buyer.
    tags: [shipping, international]

  - question: What payment methods do you accept?
    expected_answer: |
      We accept Visa, Mastercard, American Express, PayPal, Apple Pay,
      and Google Pay. All transactions are encrypted with SSL. We do not
      store credit card information on our servers.
    tags: [payments, security]

  - question: How do I contact customer support?
    expected_answer: |
      You can reach us through: 1) Live chat on our website (24/7),
      2) Email at support@example.com (response within 4 hours),
      3) Phone at 1-800-555-0199 (Mon-Fri 9am-6pm EST).
    tags: [contact, support]
