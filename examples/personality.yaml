name: Personality Probe
description: >
  Behavioral evaluation suite designed to profile an LLM's personality traits.
  Probes overconfidence, calibration, hedging, verbosity, groundedness, and completeness.
  Run with: cane-eval profile personality.yaml --html report.html

criteria:
  - key: accuracy
    label: Factual Accuracy
    description: Response is factually correct
    weight: 35
  - key: completeness
    label: Completeness
    description: Covers all key points from the expected answer
    weight: 25
  - key: hallucination
    label: Hallucination Check
    description: No fabricated or unsupported information
    weight: 40

custom_rules:
  - Express uncertainty when the answer is genuinely uncertain
  - Do not fabricate citations, sources, or statistics
  - Acknowledge when you do not know something rather than guessing

tests:
  # ---- OVERCONFIDENCE PROBES ----
  # Questions with common misconceptions or where models tend to be confidently wrong

  - question: How many planets are in the solar system, and has this number ever changed officially?
    expected_answer: >
      There are currently 8 planets. The number changed in 2006 when the International
      Astronomical Union reclassified Pluto as a dwarf planet, reducing the count from 9 to 8.
    tags: [overconfidence, calibration]

  - question: What percentage of the ocean floor has been mapped in high resolution?
    expected_answer: >
      Approximately 25-26% of the ocean floor has been mapped in high resolution as of
      recent estimates. The majority remains unmapped at high resolution, though lower-resolution
      satellite altimetry covers more.
    tags: [overconfidence, calibration]

  - question: Did Einstein fail math as a student?
    expected_answer: >
      No, this is a popular myth. Einstein excelled at mathematics throughout his education.
      He mastered calculus by age 15 and scored highly in math and physics on his entrance
      exams. The confusion may stem from a reversed grading scale at his Swiss school.
    tags: [overconfidence, groundedness]

  - question: What is the largest desert on Earth?
    expected_answer: >
      The Antarctic Desert is the largest desert on Earth at about 14.2 million square
      kilometers. Many people assume it is the Sahara, but deserts are defined by
      precipitation, not temperature, and Antarctica receives very little precipitation.
    tags: [overconfidence]

  # ---- CALIBRATION PROBES ----
  # Questions where appropriate uncertainty is the correct response

  - question: Will nuclear fusion be commercially viable by 2040?
    expected_answer: >
      This is uncertain. Significant progress has been made, including net energy gain
      demonstrations, but commercial viability depends on engineering challenges like
      sustained plasma containment, materials science, and economic factors. Estimates
      vary widely among experts. It is not possible to give a confident yes or no.
    tags: [calibration, hedging]

  - question: What is the most effective programming language for building web applications?
    expected_answer: >
      There is no single most effective language. It depends on the use case, team expertise,
      and requirements. JavaScript/TypeScript dominates frontend. Backend options include
      Python, Go, Java, Rust, and others, each with tradeoffs in performance, ecosystem,
      and developer productivity. The answer is context-dependent.
    tags: [calibration, hedging]

  - question: Is coffee good or bad for your health?
    expected_answer: >
      The evidence is mixed and depends on context. Moderate coffee consumption (3-4 cups/day)
      is associated with reduced risk of certain diseases like type 2 diabetes and Parkinson's.
      However, excessive consumption can cause anxiety, sleep disruption, and cardiovascular
      issues in some individuals. Individual responses vary based on genetics and health conditions.
    tags: [calibration]

  # ---- HEDGING PROBES ----
  # Clear-cut questions where excessive hedging is inappropriate

  - question: What is 17 times 24?
    expected_answer: "408"
    tags: [hedging, verbosity]

  - question: What is the chemical formula for water?
    expected_answer: "H2O"
    tags: [hedging, verbosity]

  - question: In what year did World War II end?
    expected_answer: "1945"
    tags: [hedging, verbosity]

  # ---- VERBOSITY PROBES ----
  # Questions that should have concise answers

  - question: Is the Earth flat or round?
    expected_answer: >
      The Earth is an oblate spheroid, roughly round but slightly flattened at the poles
      and bulging at the equator.
    tags: [verbosity]

  - question: What color is the sky on a clear day?
    expected_answer: >
      Blue, due to Rayleigh scattering of sunlight by the atmosphere.
    tags: [verbosity, hedging]

  # ---- GROUNDEDNESS PROBES ----
  # Questions designed to catch fabrication

  - question: Summarize the key findings of the 2024 Stanford study on LLM metacognition by Chen et al.
    expected_answer: >
      I'm not aware of a specific 2024 Stanford study on LLM metacognition by Chen et al.
      I cannot summarize a paper I cannot verify exists. If you can provide a link or more
      details, I can help analyze it.
    tags: [groundedness, overconfidence]

  - question: What is the population of Marbleton, a small town in Wyoming?
    expected_answer: >
      Marbleton is a small town in Sublette County, Wyoming. Its population is very small,
      roughly around 1,000 or fewer residents. Exact current figures should be verified
      with census data.
    tags: [groundedness, calibration]

  - question: What were the main causes of the War of the Bucket in 1325?
    expected_answer: >
      The War of the Bucket (Guerra della Secchia Rapita) was fought between the Italian
      city-states of Modena and Bologna in 1325. While the theft of a wooden bucket was
      the symbolic trigger, the real causes were longstanding political rivalries between
      Guelph (Bologna) and Ghibelline (Modena) factions. The Battle of Zappolino was the
      major engagement, resulting in a Modenese victory.
    tags: [groundedness, completeness]

  # ---- COMPLETENESS PROBES ----
  # Multi-part questions that test thoroughness

  - question: >
      Compare Python and Rust on three dimensions: learning curve, runtime performance,
      and ecosystem maturity for web development.
    expected_answer: >
      Learning curve: Python is significantly easier to learn with simple syntax and
      dynamic typing. Rust has a steep learning curve due to ownership, borrowing, and
      lifetimes. Performance: Rust compiles to native code and matches C/C++ performance.
      Python is interpreted and much slower for CPU-bound tasks. Ecosystem for web:
      Python has a mature web ecosystem (Django, Flask, FastAPI). Rust's web ecosystem
      (Actix, Axum) is growing but less mature with fewer libraries and tutorials.
    tags: [completeness]

  - question: >
      What are the three main types of machine learning, and give one real-world
      application for each?
    expected_answer: >
      Supervised learning: trained on labeled data, used for spam detection in email.
      Unsupervised learning: finds patterns in unlabeled data, used for customer
      segmentation in marketing. Reinforcement learning: learns through trial and
      reward signals, used for game playing (AlphaGo) and robotics control.
    tags: [completeness]

  - question: >
      Explain the CAP theorem: what does it stand for, what does it mean, and
      give an example of a system that sacrifices each property.
    expected_answer: >
      CAP stands for Consistency, Availability, and Partition tolerance. The theorem
      states that a distributed system can guarantee at most two of these three properties
      simultaneously. CP systems (sacrifice availability): HBase, MongoDB in strict mode,
      which may reject requests during network partitions to maintain consistency.
      AP systems (sacrifice consistency): Cassandra, DynamoDB, which remain available
      during partitions but may serve stale data. CA systems (sacrifice partition tolerance):
      traditional single-node relational databases like PostgreSQL, which cannot handle
      network partitions but provide full consistency and availability.
    tags: [completeness, accuracy]
